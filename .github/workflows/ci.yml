name: CI

on:
  push:
    branches:
      - main

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Setup Node.js 18
        uses: actions/setup-node@v2
        with:
          node-version: '18'

      - name: Cache npm
        uses: actions/cache@v2
        with:
          path: ~/.npm
          key: ".npm-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}"
          restore-keys: |
            .npm-${{ runner.os }}

      - name: Install Dependencies
        run: npm ci

      - name: Run Lint
        run: npm run lint

      - name: Run Tests
        run: npm test

      - name: Build
        run: npm run build

  frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Setup Node.js 18
        uses: actions/setup-node@v2
        with:
          node-version: '18'

      - name: Cache npm
        uses: actions/cache@v2
        with:
          path: ~/.npm
          key: ".npm-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}"
          restore-keys: |
            .npm-${{ runner.os }}

      - name: Install Dependencies
        run: npm ci

      - name: Run Lint
        run: npm run lint

      - name: Run Tests
        run: npm test

      - name: Build
        run: npm run build